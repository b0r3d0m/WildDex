  { id:216,name:'Barking Tree Frog',       sci:'Hyla gratiosa',               cat:'amphibian', emoji:'🐸', range:'Southeast US', desc:'The largest native tree frog in the US. Its call is a deep, hollow "dunk" repeated rapidly that supposedly resembles distant barking. Can change color dramatically based on temperature and light.' },
  { id:217,name:'Green Tree Frog',         sci:'Hyla cinerea',                cat:'amphibian', emoji:'🐸', range:'Southeast US', desc:'The state amphibian of Georgia and Louisiana. Perches on windows to catch insects drawn to light—a behavior that has endeared it to people living across the South.' },
  { id:218,name:'Jefferson Salamander',    sci:'Ambystoma jeffersonianum',    cat:'amphibian', emoji:'🦎', range:'Eastern US', desc:'Migrates en masse to vernal pools on the first warm rainy nights of late winter, sometimes while snow is still on the ground. Often hybridizes with blue-spotted salamanders.' },

  // ── FISH (additional) ──
  { id:219,name:'American Eel',            sci:'Anguilla rostrata',           cat:'fish',      emoji:'🐟', range:'Atlantic coast rivers', desc:'Spawns in the Sargasso Sea, then spends 5–20 years living in freshwater rivers before returning to the ocean to breed and die. One of the only fish to migrate the reverse direction—sea to fresh to sea.' },
  { id:220,name:'Bowfin',                  sci:'Amia calva',                  cat:'fish',      emoji:'🐟', range:'Eastern US lakes & swamps', desc:'A living fossil—the sole surviving member of an ancient fish lineage that stretches back 150 million years. Breathes air using a modified swim bladder and can survive in oxygen-depleted water.' },
  { id:221,name:'Gulf Sturgeon',           sci:'Acipenser oxyrinchus desotoi',cat:'fish',      emoji:'🐟', range:'Gulf Coast rivers', desc:'Spends winter in Gulf of Mexico feeding voraciously, then moves into rivers for summer where it eats nothing for 5 months, living off fat reserves. Can leap completely out of the water.' },
  { id:222,name:'Smallmouth Bass',         sci:'Micropterus dolomieu',        cat:'fish',      emoji:'🐟', range:'Eastern & central US', desc:'Considered by many anglers to be the greatest freshwater sport fish for its size—pound for pound a far more determined fighter than largemouth bass. Prefers clear, rocky streams and lakes.' },
  { id:223,name:'Brook Trout',             sci:'Salvelinus fontinalis',       cat:'fish',      emoji:'🐟', range:'Eastern US mountain streams', desc:'Technically a char, not a true trout. Its worm-like markings (vermiculations) on its back are unique among North American fish. Requires the coldest, purest water—a sensitive indicator of stream health.' },
  { id:224,name:'Atlantic Salmon',         sci:'Salmo salar',                 cat:'fish',      emoji:'🐟', range:'New England rivers (rare)', desc:'Once so abundant in New England rivers that servants specified in contracts they would not eat salmon more than three times a week. Now rare due to dams and overfishing, subject to intensive restoration.' },
  { id:225,name:'Steelhead',               sci:'Oncorhynchus mykiss',         cat:'fish',      emoji:'🐟', range:'Pacific Northwest rivers', desc:'The ocean-going form of rainbow trout. After spending years in the ocean, it returns to its natal river to spawn—but unlike Pacific salmon, most steelhead survive to spawn again.' },
  { id:226,name:'Bluegill',                sci:'Lepomis macrochirus',         cat:'fish',      emoji:'🐟', range:'Eastern & central US', desc:'The most commonly caught freshwater fish in the US and a classic introduction to fishing for many Americans. Males fan out and guard circular nests on shallow lake bottoms in dense colonies.' },

  // ── INVERTEBRATES (additional) ──
  { id:227,name:'Desert Tarantula',        sci:'Aphonopelma chalcodes',       cat:'insect',    emoji:'🕷️', range:'Sonoran Desert, Southwest', desc:'Despite their fearsome reputation, desert tarantulas are docile and rarely bite humans. Males wander in search of females in late summer—the origin of countless "tarantula migration" stories in Arizona.' },
  { id:228,name:'Tarantula Hawk',          sci:'Pepsis grossa',               cat:'insect',    emoji:'🪲', range:'Desert Southwest', desc:'A wasp with one of the most painful stings of any insect on the Schmidt Pain Index (2nd only to bullet ant). Paralyzes tarantulas with its sting to use as a living incubator for its larvae.' },
  { id:229,name:'Arizona Bark Scorpion',   sci:'Centruroides sculpturatus',   cat:'insect',    emoji:'🦂', range:'Sonoran Desert', desc:'The most venomous scorpion in North America and the only one dangerous to healthy adults. Glows bright blue-green under UV light—a popular way to find them at night.' },
  { id:230,name:'Black Widow Spider',      sci:'Latrodectus hesperus',        cat:'insect',    emoji:'🕷️', range:'Western & southern US', desc:'The female\'s neurotoxic venom is 15 times more potent than a rattlesnake\'s by volume, though the much smaller amount injected rarely causes death in healthy adults. Males are harmless.' },
  { id:231,name:'Brown Recluse',           sci:'Loxosceles reclusa',          cat:'insect',    emoji:'🕷️', range:'South-central US', desc:'Identified by a distinctive violin-shaped marking. Its venom causes tissue death around the bite. Shy and non-aggressive—most bites occur when people accidentally compress a hidden spider.' },
  { id:232,name:'Eastern Dobsonfly',       sci:'Corydalus cornutus',          cat:'insect',    emoji:'🪲', range:'Eastern US streams', desc:'Males have enormous curved mandibles up to an inch long—used only for grasping females during mating, not for defense. Larvae (hellgrammites) live in streams and are prized fishing bait.' },
  { id:233,name:'Giant Water Bug',         sci:'Lethocerus americanus',       cat:'insect',    emoji:'🪲', range:'All of US', desc:'Called "toe-biters," these are among the largest insects in North America. Fearlessly attacks frogs, fish, and salamanders several times its size, injecting saliva that liquefies tissue.' },
  { id:234,name:'Pipevine Swallowtail',    sci:'Battus philenor',             cat:'insect',    emoji:'🦋', range:'Southern & eastern US', desc:'Its caterpillars sequester toxic chemicals from pipevine plants, making the adults unpalatable. Several other butterfly species mimic its iridescent blue-black coloration to gain protection.' },
  { id:235,name:'Giant Swallowtail',       sci:'Papilio cresphontes',         cat:'insect',    emoji:'🦋', range:'Eastern US', desc:'The largest butterfly in North America with a wingspan reaching 6 inches. Its caterpillars—called "orange dogs"—mimic bird droppings with remarkable accuracy.' },
  { id:236,name:'Zebra Longwing',          sci:'Heliconius charithonia',      cat:'insect',    emoji:'🦋', range:'Southern US, Florida', desc:'Florida\'s state butterfly. Uniquely among butterflies, it collects and digests pollen for protein, which allows it to live up to 6 months—far longer than most butterflies.' },
  { id:237,name:'Question Mark Butterfly', sci:'Polygonia interrogationis',   cat:'insect',    emoji:'🦋', range:'Eastern US', desc:'Named for a tiny silver question-mark shape on the underside of its wing. Overwinters as an adult, pressing flat against bark with wings closed to appear as a dead leaf.' },
  { id:238,name:'American Snout Butterfly',sci:'Libytheana carinenta',        cat:'insect',    emoji:'🦋', range:'Southern US', desc:'Periodically erupts in massive southward migrations of millions of individuals in Texas, possibly triggered by rains that cause hackberry trees—its only larval host plant—to flush new growth.' },
  { id:239,name:'Velvet Ant (Cow Killer)', sci:'Dasymutilla occidentalis',    cat:'insect',    emoji:'🐜', range:'Eastern US', desc:'Despite the fuzzy, ant-like appearance of the female, this is actually a wingless wasp. Its sting is legendary for its intensity—supposedly strong enough to kill a cow (it cannot).' },
  { id:240,name:'Periodical Cicada',       sci:'Magicicada septendecim',      cat:'insect',    emoji:'🪲', range:'Eastern US', desc:'Emerges in synchronized broods of billions after spending 13 or 17 years underground. The prime-number lifecycle is thought to be an evolutionary strategy to avoid synchronizing with predator population cycles.' },

  // ── MAMMALS (additional II) ──
  { id:241,name:'Island Fox',             sci:'Urocyon littoralis',           cat:'mammal',    emoji:'🦊', range:'Channel Islands, California', desc:'Found only on six of California\'s Channel Islands, it is the smallest fox in the US—about the size of a house cat. After a catastrophic decline caused by golden eagles, it was brought back from the brink in one of the fastest endangered species recoveries ever recorded.' },
  { id:242,name:'Star-nosed Mole',        sci:'Condylura cristata',           cat:'mammal',    emoji:'🐾', range:'Eastern US & Canada', desc:'Has 22 pink fleshy tentacles ringing its nose containing more nerve fibers than a human hand. It is the fastest-eating mammal on Earth, identifying and consuming a food item in under 227 milliseconds.' },
  { id:243,name:'Nutria',                 sci:'Myocastor coypus',             cat:'mammal',    emoji:'🦫', range:'Gulf Coast, Pacific Northwest (introduced)', desc:'A large South American rodent introduced for the fur trade that has escaped into US wetlands and causes enormous ecological damage by uprooting marsh vegetation entirely.' },
  { id:244,name:'Steller Sea Lion',       sci:'Eumetopias jubatus',           cat:'mammal',    emoji:'🦭', range:'Pacific coast, Alaska', desc:'The largest member of the eared seal family, with males reaching 2,500 lbs. Named after naturalist Georg Steller who documented them during Vitus Bering\'s 1741 expedition to Alaska.' },
  { id:245,name:'Northern Fur Seal',      sci:'Callorhinus ursinus',          cat:'mammal',    emoji:'🦭', range:'Pacific coast (breeding Pribilof Islands)', desc:'Has the densest fur of any mammal—300,000 hairs per square inch, compared to about 100,000 on an entire human head. Spends most of the year at sea, coming ashore only to breed.' },
  { id:246,name:'Walrus',                 sci:'Odobenus rosmarus',            cat:'mammal',    emoji:'🦭', range:'Arctic Alaska', desc:'Uses its iconic tusks—elongated canine teeth—as an ice pick to haul its enormous body onto ice floes, for dominance fights, and to impress mates. A 3,700-lb male\'s tusks can reach 3 feet long.' },
  { id:247,name:'Dall Sheep',             sci:'Ovis dalli',                   cat:'mammal',    emoji:'🐑', range:'Alaska mountains', desc:'Pure white sheep of Alaska\'s alpine peaks. Males carry massive spiral horns that grow throughout their lives; a full curl takes 8 years. Age can be read from growth rings on the horns.' },

  // ── BIRDS (additional II) ──
  { id:248,name:'Barn Owl',               sci:'Tyto alba',                    cat:'bird',      emoji:'🦉', range:'All of US', desc:'Its heart-shaped white face is a parabolic dish that funnels sound to its asymmetrically positioned ears. Can hunt in complete darkness by sound alone, detecting a mouse hidden under a foot of snow.' },
  { id:249,name:'Monk Parakeet',          sci:'Myiopsitta monachus',          cat:'bird',      emoji:'🦜', range:'Florida, Texas, Northeast cities (feral)', desc:'An Argentine parrot that escaped captivity in the 1960s and established feral colonies across the US. The only parrot in the world that builds large communal stick nests rather than nesting in cavities.' },
  { id:250,name:'Red-crowned Parrot',     sci:'Amazona viridigenalis',        cat:'bird',      emoji:'🦜', range:'Southern California, Texas (feral)', desc:'Native to northeastern Mexico and critically endangered in its home range, but a thriving feral population in California now rivals the wild population in size. Loud and conspicuous in suburban neighborhoods.' },
  { id:251,name:'Nanday Parakeet',        sci:'Aratinga nenday',              cat:'bird',      emoji:'🦜', range:'Florida, California (feral)', desc:'A black-hooded South American parakeet with established feral colonies in Florida and California. Flocks are conspicuous and noisy, roosting communally in palms and making a harsh, screeching call.' },
  { id:252,name:'Atlantic Puffin',        sci:'Fratercula arctica',           cat:'bird',      emoji:'🐦', range:'Gulf of Maine (breeding islands)', desc:'Spends most of its life at sea but returns to the same burrow on rocky Atlantic islands each year. Its distinctive striped bill is actually dull gray in winter—the colorful summer sheath is shed.' },
  { id:253,name:'Common Murre',           sci:'Uria aalge',                   cat:'bird',      emoji:'🐦', range:'Pacific & Atlantic coasts', desc:'Nests on sheer cliff ledges so tightly packed that birds touch on all sides. Its egg is pear-shaped so it spins in a tight circle rather than rolling off the narrow cliff edge.' },
  { id:254,name:'Herring Gull',           sci:'Larus argentatus',             cat:'bird',      emoji:'🐦', range:'All US coasts & Great Lakes', desc:'The archetypal "seagull" of the northern US. Learned to drop shellfish onto hard surfaces to crack them open—a behavior observed spreading through populations in real time.' },
  { id:255,name:'Laughing Gull',          sci:'Leucophaeus atricilla',        cat:'bird',      emoji:'🐦', range:'Atlantic & Gulf coasts', desc:'Named for its loud, laughing call that echoes across southeastern beaches and marinas. Aggressively robs food from pelicans by landing on their heads as the pouch drains.' },
  { id:256,name:'Least Tern',             sci:'Sternula antillarum',          cat:'bird',      emoji:'🐦', range:'US coasts & interior rivers', desc:'The smallest tern in the US. Plunge-dives from height to catch fish and feeds them to its mate as courtship. Nests on bare sand and gravel, making it highly vulnerable to beach disturbance.' },
  { id:257,name:'Black Skimmer',          sci:'Rynchops niger',               cat:'bird',      emoji:'🐦', range:'Atlantic & Gulf coasts', desc:'The only bird in the US with a lower mandible longer than the upper. Flies low with its blade-like lower bill slicing the water surface, snapping shut instantly when it touches a fish.' },
  { id:258,name:'Red Knot',               sci:'Calidris canutus',             cat:'bird',      emoji:'🐦', range:'Atlantic coast (migratory)', desc:'Undertakes one of the longest migrations of any bird—18,000 miles round trip from the Arctic to South America. Depends critically on Delaware Bay horseshoe crab eggs to refuel in May.' },
  { id:259,name:'Long-billed Curlew',     sci:'Numenius americanus',          cat:'bird',      emoji:'🐦', range:'Western US grasslands', desc:'North America\'s largest shorebird, with a bill up to 9 inches long—one of the most extreme bill proportions of any bird. Inserts its bill into burrows to extract burrowing owls, crayfish, and crabs.' },
  { id:260,name:'Prothonotary Warbler',   sci:'Protonotaria citrea',          cat:'bird',      emoji:'🐦', range:'Eastern US swamps', desc:'A blazing golden bird of flooded forests and swamps. The only eastern warbler that nests in natural tree cavities over water. Famous for playing a role in the Alger Hiss espionage trial in 1948.' },
  { id:261,name:'Kirtland\'s Warbler',   sci:'Setophaga kirtlandii',         cat:'bird',      emoji:'🐦', range:'Michigan jack pine forests', desc:'One of the rarest warblers in the world, nesting exclusively in young jack pine forests in Michigan. Numbers dropped to 167 singing males in 1987 before intensive management and cowbird control reversed the decline.' },
  { id:262,name:'Red Crossbill',          sci:'Loxia curvirostra',            cat:'bird',      emoji:'🐦', range:'Conifer forests across US', desc:'Its crossed bill tips are a specialized tool for prying open pine cones. Breeds whenever and wherever cone crops are abundant—sometimes in January in northern forests when food is plentiful.' },
  { id:263,name:'Snow Bunting',           sci:'Plectrophenax nivalis',         cat:'bird',      emoji:'🐦', range:'Northern US (winter)', desc:'A blizzard bird—arrives in the US when snow falls across the northern plains. Flocks wheel and flash white against gray winter skies, earning them names like "snowflakes" and "snowbirds."' },
  { id:264,name:'Purple Martin',          sci:'Progne subis',                 cat:'bird',      emoji:'🐦', range:'Eastern US (summer)', desc:'North America\'s largest swallow and entirely dependent in the east on human-provided nest boxes. Early Native American traditions of hanging hollow gourds for martins predate European contact.' },
  { id:265,name:'Barn Swallow',           sci:'Hirundo rustica',              cat:'bird',      emoji:'🐦', range:'All of US (summer)', desc:'The most widespread swallow in the world, found on every continent except Antarctica. Builds cup-shaped mud nests on human structures and has co-evolved with humans for thousands of years.' },

  // ── REPTILES (additional II) ──
  { id:266,name:'Eastern Black Racer',    sci:'Coluber constrictor constrictor',cat:'reptile', emoji:'🐍', range:'Eastern US', desc:'Despite the name "constrictor," it doesn\'t actually constrict—it simply grabs and swallows prey alive. Can reach speeds of 4 mph and hunts actively through brush during the day, unlike most snakes.' },
  { id:267,name:'Eastern Hognose Snake',  sci:'Heterodon platirhinos',        cat:'reptile',   emoji:'🐍', range:'Eastern US', desc:'Performs one of nature\'s most dramatic bluffs: flattens its neck like a cobra, hisses, and mock-strikes when threatened. If that fails, it rolls onto its back, opens its mouth, and plays dead convincingly.' },
  { id:268,name:'Rubber Boa',             sci:'Charina bottae',               cat:'reptile',   emoji:'🐍', range:'Western US', desc:'One of only two boa species native to the US. So gentle and slow-moving it can be held immediately after capture. Has a blunt, rubber-tipped tail that mimics its head to confuse predators.' },
  { id:269,name:'Kemp\'s Ridley Sea Turtle',sci:'Lepidochelys kempii',        cat:'reptile',   emoji:'🐢', range:'Gulf Coast, Atlantic coast', desc:'The most endangered sea turtle in the world. Nearly the entire population nests on a single 16-mile stretch of beach in Tamaulipas, Mexico, and the Texas coast in a spectacular mass nesting called an "arribada."' },
  { id:270,name:'Hawksbill Sea Turtle',   sci:'Eretmochelys imbricata',       cat:'reptile',   emoji:'🐢', range:'Gulf Coast, Florida', desc:'Its narrow beak is adapted for extracting sea sponges from coral reef crevices. Historically hunted nearly to extinction for its beautiful shell material—"tortoiseshell"—used in jewelry and combs.' },
  { id:271,name:'Eastern Glass Lizard',   sci:'Ophisaurus ventralis',         cat:'reptile',   emoji:'🦎', range:'Southeast US', desc:'A legless lizard—not a snake—that can lose its tail (which makes up two-thirds of its length) as a defensive trick. Has ear openings and moveable eyelids, which snakes lack.' },
  { id:272,name:'Burmese Python',         sci:'Python bivittatus',            cat:'reptile',   emoji:'🐍', range:'South Florida (invasive)', desc:'An introduced giant that has devastated mammal populations in the Everglades. Populations of raccoons, opossums, and rabbits have collapsed by over 90% since the snake\'s establishment. Individuals reach 18 feet.' },
  { id:273,name:'Coachwhip',              sci:'Masticophis flagellum',        cat:'reptile',   emoji:'🐍', range:'Southern & western US', desc:'One of the fastest snakes in North America. Named for its braided whip-like appearance and can "whip" its body with surprising speed. Folklore claims it chases people and whips them, which is false.' },

  // ── AMPHIBIANS (additional II) ──
  { id:274,name:'California Newt',        sci:'Taricha torosa',               cat:'amphibian', emoji:'🦎', range:'Coastal California', desc:'Produces tetrodotoxin—the same toxin as puffer fish—making it one of the most toxic animals in North America. A single newt contains enough toxin to kill 25,000 mice. Garter snakes in its range have evolved resistance.' },
  { id:275,name:'Rough-skinned Newt',     sci:'Taricha granulosa',            cat:'amphibian', emoji:'🦎', range:'Pacific Northwest', desc:'Its population and the common garter snake\'s toxin resistance are locked in a coevolutionary arms race, with newts becoming more toxic and snakes becoming more resistant in tandem over millennia.' },
  { id:276,name:'Ensatina',               sci:'Ensatina eschscholtzii',       cat:'amphibian', emoji:'🦎', range:'Pacific coast', desc:'A textbook example of a "ring species"—populations form a ring around California\'s Central Valley, with neighboring populations able to interbreed but the two end-of-the-ring populations that meet in the south cannot.' },
  { id:277,name:'Tailed Frog',            sci:'Ascaphus truei',               cat:'amphibian', emoji:'🐸', range:'Pacific Northwest streams', desc:'One of the most ancient frog lineages in North America, diverged from other frogs 200 million years ago. The "tail" is actually a mating organ unique among frogs, an adaptation to the swift mountain streams where it breeds.' },
  { id:278,name:'Arboreal Salamander',    sci:'Aneides lugubris',             cat:'amphibian', emoji:'🦎', range:'California coast ranges', desc:'One of the few salamanders that can climb trees, with slightly prehensile tails and enlarged toe pads. Bites hard when handled—unusual for a salamander. Nests communally in tree cavities and logs.' },

  // ── FISH — SHARKS & MARINE (additional) ──
  { id:279,name:'Great White Shark',      sci:'Carcharodon carcharias',       cat:'fish',      emoji:'🦈', range:'US coastal waters (both coasts)', desc:'The ocean\'s apex predator and the largest predatory fish on Earth. Contrary to its movie reputation, it prefers seals and sea lions to humans. Numbers are rising along the California and New England coasts after decades of protection.' },
  { id:280,name:'Leopard Shark',          sci:'Triakis semifasciata',         cat:'fish',      emoji:'🦈', range:'Pacific coast, especially California bays', desc:'One of the most common sharks in California bays and estuaries. Its striking spotted pattern makes it unmistakable. Harmless to humans and frequently seen in shallow water at La Jolla Cove, San Francisco Bay, and Tomales Bay.' },
  { id:281,name:'Bull Shark',             sci:'Carcharhinus leucas',          cat:'fish',      emoji:'🦈', range:'Gulf Coast, Atlantic coast, large rivers', desc:'The most dangerous shark to humans, responsible for more attacks than any other species. Uniquely can tolerate freshwater and has been found in the Mississippi River hundreds of miles from the sea.' },
  { id:282,name:'Scalloped Hammerhead',   sci:'Sphyrna lewini',               cat:'fish',      emoji:'🦈', range:'Atlantic & Pacific coasts', desc:'The distinctive hammer-shaped head (cephalofoil) gives it 360-degree vertical vision and houses an amplified array of electroreceptors. Forms enormous schools of hundreds off Pacific coasts during summer.' },
  { id:283,name:'Whale Shark',            sci:'Rhincodon typus',              cat:'fish',      emoji:'🦈', range:'Gulf of Mexico, Atlantic coast (seasonal)', desc:'The largest fish on Earth, reaching 40 feet, and completely harmless—a filter feeder that scoops up plankton and fish eggs. Known aggregations off Isla Holbox, Mexico attract visitors from the US southern coast.' },
  { id:284,name:'Tiger Shark',            sci:'Galeocerdo cuvier',            cat:'fish',      emoji:'🦈', range:'Gulf Coast, Atlantic & Pacific coasts', desc:'Second only to great whites in attacks on humans. Its indiscriminate appetite is legendary—license plates, tires, and chicken coops have been found in its stomach. Tiger stripes fade with age.' },
  { id:285,name:'Nurse Shark',            sci:'Ginglymostoma cirratum',       cat:'fish',      emoji:'🦈', range:'Atlantic coast, Gulf of Mexico', desc:'Spends most of its day motionless on the sea floor or wedged under coral ledges. Uses powerful suction to inhale prey from rock crevices. Harmless unless grabbed by the tail, in which case it bites tenaciously.' },
  { id:286,name:'Pacific Halibut',        sci:'Hippoglossus stenolepis',      cat:'fish',      emoji:'🐟', range:'Pacific coast', desc:'The largest flatfish in the world, reaching 8 feet and 500 lbs. Both eyes migrate to the same side of the head as juveniles. A single fish can yield hundreds of pounds of meat.' },
  { id:287,name:'Atlantic Bluefin Tuna',  sci:'Thunnus thynnus',              cat:'fish',      emoji:'🐟', range:'Atlantic coast', desc:'One of the largest bony fish—up to 1,500 lbs and 10 feet long. A warm-blooded fish that maintains body temperature above the surrounding water. Single bluefins have sold at auction for over $1 million in Japan.' },
  { id:288,name:'Red Snapper',            sci:'Lutjanus campechanus',         cat:'fish',      emoji:'🐟', range:'Gulf of Mexico, Atlantic coast', desc:'One of the most sought-after sport and commercial fish in the Gulf of Mexico. Lives on rocky bottoms and offshore oil platforms for decades—age records reach 50 years. Distinct red eyes match its body color.' },
  { id:289,name:'Goliath Grouper',        sci:'Epinephelus itajara',          cat:'fish',      emoji:'🐟', range:'Southeast Atlantic coast, Gulf Coast', desc:'Can reach 800 lbs and 8 feet. Was nearly fished to extinction; since a 1990 fishing ban, populations have rebounded dramatically around Florida reefs and wrecks. Known to stun prey with a powerful bass-drum "boom."' },
  { id:290,name:'Atlantic Cod',           sci:'Gadus morhua',                 cat:'fish',      emoji:'🐟', range:'New England coast', desc:'The fish that fed Europe for centuries and drove the colonization of New England. Populations collapsed catastrophically in the 1990s due to overfishing and have largely failed to recover despite decades of fishing restrictions.' },

  // ── INVERTEBRATES (additional II) ──
  { id:291,name:'Banana Slug',            sci:'Ariolimax columbianus',        cat:'insect',    emoji:'🐛', range:'Pacific Northwest & California redwood forests', desc:'North America\'s largest land slug, reaching 10 inches, and named for its vivid yellow color. Produces copious mucus used for locomotion, moisture retention, and as an anesthetic—licking one will numb your tongue.' },
  { id:292,name:'Giant Pacific Octopus',  sci:'Enteroctopus dofleini',        cat:'insect',    emoji:'🐙', range:'Pacific Northwest coast & rocky reefs', desc:'The largest octopus species, with arms spanning up to 14 feet. Has three hearts, blue copper-based blood, and nine brains. Can open jars, recognize individual human faces, and solve complex puzzles.' },
  { id:293,name:'Moon Jellyfish',         sci:'Aurelia aurita',               cat:'insect',    emoji:'🪼', range:'Both US coasts', desc:'Translucent and bioluminescent, drifting with ocean currents in vast swarms called blooms. Despite their delicate appearance, they are voracious predators of zooplankton and fish larvae.' },
  { id:294,name:'Lion\'s Mane Jellyfish', sci:'Cyanea capillata',             cat:'insect',    emoji:'🪼', range:'Pacific & Atlantic coasts (cold water)', desc:'The largest jellyfish in the world, with tentacles extending over 100 feet—longer than a blue whale. Found in cold northern waters, where blooms wash ashore on New England and Pacific Northwest beaches.' },
  { id:295,name:'Portuguese Man o\' War', sci:'Physalia physalis',            cat:'insect',    emoji:'🪼', range:'Atlantic coast, Gulf of Mexico', desc:'Not a jellyfish but a colonial organism—a siphonophore—composed of genetically identical individuals, each specialized for a different function. Its tentacles can still sting hours after the animal is dead on the beach.' },
  { id:296,name:'Purple Sea Urchin',      sci:'Strongylocentrotus purpuratus',cat:'insect',    emoji:'🦔', range:'Pacific coast tide pools', desc:'Excavates depressions in rock using its teeth and spines to hide from wave surge. When sea otters are absent, urchin populations explode and devour entire kelp forests, creating "urchin barrens."' },
  { id:297,name:'Sunflower Sea Star',     sci:'Pycnopodia helianthoides',     cat:'insect',    emoji:'⭐', range:'Pacific coast (now critically endangered)', desc:'The largest sea star in the world with up to 24 arms. A critical predator of sea urchins that once kept kelp forests healthy. Sea star wasting disease wiped out over 90% of the population since 2013.' },
  { id:298,name:'Giant Green Anemone',    sci:'Anthopleura xanthogrammica',   cat:'insect',    emoji:'🌺', range:'Pacific coast tide pools', desc:'Gets its vivid green color from symbiotic algae living inside its tissues—it partially photosynthesizes. Can clone itself by splitting in two, creating genetically identical patches on tide pool walls.' },
  { id:299,name:'California Spiny Lobster',sci:'Panulirus interruptus',       cat:'insect',    emoji:'🦞', range:'Southern California coast', desc:'Unlike Atlantic lobsters, it lacks claws—instead it has long spiny antennae it rubs together to produce a rasping sound that deters predators. Highly prized in Southern California restaurants.' },
  { id:300,name:'Mantis Shrimp',          sci:'Stomatopoda spp.',             cat:'insect',    emoji:'🦐', range:'Pacific & Atlantic coasts', desc:'Has 16 types of color receptors (humans have 3) and can see ultraviolet, infrared, and polarized light. Its "smasher" club can strike with the force of a .22 caliber bullet, shattering aquarium glass.' },

  // ── MAMMALS (additional III) ──
  { id:301,name:'Western Gray Squirrel',   sci:'Sciurus griseus',              cat:'mammal',    emoji:'🐿️', range:'California, Oregon, Washington', desc:'Larger and more silvery than its eastern cousin, the western gray squirrel is a year-round resident of oak woodlands and ponderosa pine forests along the Pacific coast. Strictly a seed and nut eater that does not cache food underground.' },
  { id:302,name:'Fox Squirrel',            sci:'Sciurus niger',                cat:'mammal',    emoji:'🐿️', range:'Eastern & central US', desc:'The largest tree squirrel in North America, sometimes weighing twice as much as a gray squirrel. Color varies from orange-red to gray-black across its range. Has adapted readily to suburban parks and yards.' },
  { id:303,name:'American Red Squirrel',   sci:'Tamiasciurus hudsonicus',      cat:'mammal',    emoji:'🐿️', range:'Northern & mountain forests', desc:'Fiercely territorial and punching well above its weight class—will chase off squirrels many times its size. Creates enormous middens of conifer cone scales that can measure yards across after decades of use.' },
  { id:304,name:'Eastern Chipmunk',        sci:'Tamias striatus',              cat:'mammal',    emoji:'🐿️', range:'Eastern US', desc:'A solitary, tunnel-digging rodent that stuffs its stretchy cheek pouches with nuts and seeds, carrying up to 35 acorns in a single trip. Hibernates but wakes periodically through winter to eat from underground caches.' },
  { id:305,name:'Least Chipmunk',          sci:'Neotamias minimus',            cat:'mammal',    emoji:'🐿️', range:'Western US & Great Plains', desc:'The smallest and most widespread chipmunk in North America, found from sagebrush flats to mountain timberline. Its striped pattern extends to the face—a key distinction from most ground squirrels.' },
  { id:306,name:'Desert Cottontail',       sci:'Sylvilagus audubonii',         cat:'mammal',    emoji:'🐰', range:'Western US', desc:'The dominant rabbit of western scrub and desert grasslands. Unlike the eastern cottontail, it readily climbs low trees and shrubs to escape predators or reach food. Active at dawn, dusk, and on cloudy days.' },
  { id:307,name:'Little Brown Bat',        sci:'Myotis lucifugus',             cat:'mammal',    emoji:'🦇', range:'Most of US', desc:'One of the most common bats in North America, forming roosts of thousands in attics, barns, and caves. White-nose syndrome, a fungal disease, has devastated populations—some colonies have lost over 90% of members.' },
  { id:308,name:'Big Brown Bat',           sci:'Eptesicus fuscus',             cat:'mammal',    emoji:'🦇', range:'All of US', desc:'One of the most cold-tolerant bats in the US, often the last species to hibernate in autumn and the first to emerge in spring. A single bat can consume over 1,000 pest insects per hour.' },
  { id:309,name:'Orca (Killer Whale)',     sci:'Orcinus orca',                 cat:'mammal',    emoji:'🐬', range:'Pacific coast, Alaska', desc:'The apex predator of the ocean, found in every sea on Earth. The Pacific Northwest\'s resident pods specialize in salmon; transient pods hunt marine mammals. Each pod has a unique dialect of calls passed down through generations.' },
  { id:310,name:'Beluga Whale',            sci:'Delphinapterus leucas',        cat:'mammal',    emoji:'🐳', range:'Arctic Alaska', desc:'The only white whale species. Its flexible neck allows it to turn its head independently—unique among whales. Called the "canary of the sea" for its extraordinary range of clicks, whistles, and chirps.' },
  { id:311,name:'Sperm Whale',             sci:'Physeter macrocephalus',       cat:'mammal',    emoji:'🐳', range:'Deep offshore US waters', desc:'The largest toothed predator on Earth and the deepest-diving mammal, plunging over 7,000 feet to hunt giant squid in total darkness. Its enormous square head contains up to 500 gallons of spermaceti oil.' },
  { id:312,name:'Common Dolphin',          sci:'Delphinus delphis',            cat:'mammal',    emoji:'🐬', range:'Atlantic & Pacific coasts', desc:'Forms some of the largest gatherings of any mammal—"superpods" of tens of thousands have been spotted off the California coast. The hourglass pattern on its flank makes it one of the most visually striking cetaceans.' },

  // ── BIRDS (additional III) ──
  { id:313,name:'Turkey Vulture',          sci:'Cathartes aura',               cat:'bird',      emoji:'🦅', range:'All of US', desc:'Soars for hours without a wingbeat, tilting side to side on its dihedral wings. Unlike other birds, it finds carrion primarily by smell—it has one of the most acute senses of smell of any bird on Earth.' },
  { id:314,name:'Black Vulture',           sci:'Coragyps atratus',             cat:'bird',      emoji:'🦅', range:'Eastern & southern US', desc:'Has a poor sense of smell and often follows turkey vultures to carcasses. More aggressive and social than its cousin, it will mob and displace turkey vultures at food. Will eat almost anything organic.' },
  { id:315,name:'Acorn Woodpecker',        sci:'Melanerpes formicivorus',       cat:'bird',      emoji:'🐦', range:'Pacific coast, Southwest', desc:'A clown-faced woodpecker that lives in communal groups of up to 16 birds and drills thousands of holes in "granary trees" to store individual acorns—one granary tree was found to hold 50,000 acorns.' },
  { id:316,name:'Northern Flicker',        sci:'Colaptes auratus',             cat:'bird',      emoji:'🐦', range:'All of US', desc:'Unlike most woodpeckers, it forages mostly on the ground, feeding heavily on ants and beetles. The eastern "yellow-shafted" and western "red-shafted" forms flash their colorful underwings in flight.' },
  { id:317,name:'Red-bellied Woodpecker',  sci:'Melanerpes carolinus',         cat:'bird',      emoji:'🐦', range:'Eastern US', desc:'Despite the name, the red belly is usually hidden. The bold red cap is the more visible feature. Has dramatically expanded its range northward in recent decades, following suburbanization and backyard bird feeders.' },
  { id:318,name:'Downy Woodpecker',        sci:'Dryobates pubescens',          cat:'bird',      emoji:'🐦', range:'All of US except Hawaii', desc:'The smallest woodpecker in North America and the most common one at backyard feeders. Its tiny bill allows it to excavate weed stems and goldenrod galls for the insects living inside.' },
  { id:319,name:'Cooper\'s Hawk',          sci:'Accipiter cooperii',           cat:'bird',      emoji:'🦅', range:'All of US', desc:'An agile forest predator specializing in catching birds in flight through dense vegetation—it navigates obstacles by folding its wings at full speed. Now thrives in cities, hunting at backyard feeders.' },
  { id:320,name:'Sharp-shinned Hawk',      sci:'Accipiter striatus',           cat:'bird',      emoji:'🦅', range:'All of US', desc:'The smallest hawk in North America. A fierce songbird hunter that migrates in enormous numbers past hawk watch sites each autumn—thousands may pass a single ridge on a good day in October.' },
  { id:321,name:'Northern Harrier',        sci:'Circus hudsonius',             cat:'bird',      emoji:'🦅', range:'All of US', desc:'Hunts low over marshes and grasslands on long buoyant wings, using its owl-like facial disc to funnel sound and locate prey hidden in vegetation. The only US hawk with pronounced sexual dimorphism in plumage color.' },
  { id:322,name:'Swallow-tailed Kite',     sci:'Elanoides forficatus',         cat:'bird',      emoji:'🦅', range:'Southeast US (summer)', desc:'Arguably the most graceful bird in North America, with a deeply forked tail and effortless acrobatic flight. Snatches prey from treetops without landing. Migrates all the way to South America each winter.' },
  { id:323,name:'Mississippi Kite',        sci:'Ictinia mississippiensis',     cat:'bird',      emoji:'🦅', range:'Southern US (summer)', desc:'A supremely aerial predator that catches large insects—especially cicadas and dragonflies—on the wing and eats them in flight without landing. Has colonized suburban parks and golf courses across the South.' },
  { id:324,name:'Harris\'s Hawk',          sci:'Parabuteo unicinctus',         cat:'bird',      emoji:'🦅', range:'Desert Southwest', desc:'The only hawk known to hunt cooperatively in family groups, coordinating like wolves to flush and surround prey. Perches in "stacking" formations, with multiple birds on a single saguaro cactus.' },
  { id:325,name:'Elf Owl',                 sci:'Micrathene whitneyi',          cat:'bird',      emoji:'🦉', range:'Desert Southwest', desc:'The smallest owl in the world—no bigger than a sparrow—nesting in saguaro cactus holes excavated by Gila woodpeckers. Migrates to Mexico each winter, unlike most North American owls.' },
  { id:326,name:'Eastern Screech-Owl',     sci:'Megascops asio',               cat:'bird',      emoji:'🦉', range:'Eastern US', desc:'A master of camouflage that flattens its feathers and stretches upright to resemble a broken branch. Comes in two color morphs—red and gray—that are unrelated to sex or age, both occurring in the same populations.' },
  { id:327,name:'California Scrub-Jay',    sci:'Aphelocoma californica',       cat:'bird',      emoji:'🐦', range:'Pacific coast, western foothills', desc:'Intelligent and bold, scrub-jays are known to hold "funerals" when a flock member dies—gathering around the body and calling loudly for 15–30 minutes. They also cache food and remember what, where, and when they hid it.' },
  { id:328,name:'Yellow-billed Magpie',    sci:'Pica nuttalli',                cat:'bird',      emoji:'🐦', range:'California only', desc:'Found nowhere else on Earth—endemic to California\'s Central Valley and adjacent foothills. Distinguishable from the black-billed magpie by its yellow bill and yellow eye patch. Populations were devastated by West Nile virus after 2004.' },
  { id:329,name:'Black-billed Magpie',     sci:'Pica hudsonia',                cat:'bird',      emoji:'🐦', range:'Western US & Great Plains', desc:'One of the most striking birds of western North America, with iridescent green-and-blue tail feathers that can be longer than the body. Builds enormous domed stick nests the size of a basketball—used by many other species after abandonment.' },
  { id:330,name:'American Dipper',         sci:'Cinclus mexicanus',            cat:'bird',      emoji:'🐦', range:'Western mountain streams', desc:'North America\'s only truly aquatic songbird. Walks underwater along streambeds, "flying" with its wings against the current to catch larvae. Bobs incessantly—the "dipping" behavior that gives it its name.' },
  { id:331,name:'Mountain Bluebird',       sci:'Sialia currucoides',           cat:'bird',      emoji:'🐦', range:'Western US', desc:'The male is one of the most intensely sky-blue birds in North America—virtually no brown or orange. Hovers like a kestrel over open meadows scanning for insects below, then drops to the ground to catch them.' },
  { id:332,name:'Eastern Bluebird',        sci:'Sialia sialis',                cat:'bird',      emoji:'🐦', range:'Eastern US', desc:'A beloved symbol of happiness and the official state bird of Missouri and New York. Nearly vanished in the 20th century due to competition with introduced starlings for nest holes. Recovered dramatically after thousands of nest box trails were established.' },
  { id:333,name:'Varied Thrush',           sci:'Ixoreus naevius',              cat:'bird',      emoji:'🐦', range:'Pacific Northwest forests', desc:'An iconic bird of the Pacific rainforest, whose haunting single-note whistle is the quintessential sound of old-growth Douglas-fir forest. In winter, some wander eastward—appearing at backyard feeders far outside their usual range.' },
  { id:334,name:'Western Tanager',         sci:'Piranga ludoviciana',          cat:'bird',      emoji:'🐦', range:'Western US (summer)', desc:'The male\'s flame-orange head and yellow body make it arguably the most colorful bird in the West. Despite its brilliant colors, it can be surprisingly hard to spot high in pine and fir trees during breeding season.' },
  { id:335,name:'Scarlet Tanager',         sci:'Piranga olivacea',             cat:'bird',      emoji:'🐦', range:'Eastern US (summer)', desc:'The male in breeding plumage—blazing red body, jet-black wings—is one of the most spectacular birds in North America. Despite this, it can be nearly invisible in a leafy forest canopy, betrayed only by its hoarse, burry song.' },
  { id:336,name:'Spotted Towhee',          sci:'Pipilo maculatus',             cat:'bird',      emoji:'🐦', range:'Western US', desc:'Scratches loudly in leaf litter with both feet simultaneously, making a noise disproportionate to its size. A ground-nesting bird of dense shrubby habitats, it is more often heard than seen despite its bold spotted plumage.' },
  { id:337,name:'Eastern Towhee',          sci:'Pipilo erythrophthalmus',      cat:'bird',      emoji:'🐦', range:'Eastern US', desc:'Its "drink-your-teeeea!" song rings from brushy thickets across the East. Like the spotted towhee, it double-scratches through leaf litter looking for insects and seeds. Red eyes glow like tiny rubies.' },
  { id:338,name:'Loggerhead Shrike',       sci:'Lanius ludovicianus',          cat:'bird',      emoji:'🐦', range:'Southern & central US', desc:'Despite having no talons, this songbird kills lizards, mice, and large insects by impaling them on thorns or barbed wire—earning it the nickname "butcherbird." Maintains a larder of skewered prey for later consumption.' },
  { id:339,name:'Mourning Dove',           sci:'Zenaida macroura',             cat:'bird',      emoji:'🕊️', range:'All of US', desc:'The most abundant game bird in North America, with a population of around 350 million. Its mournful cooing is one of the most familiar sounds of the American countryside. Makes a distinctive whistling sound when it takes flight.' },
  { id:340,name:'Rufous Hummingbird',      sci:'Selasphorus rufus',            cat:'bird',      emoji:'🐦', range:'Western US (summer/migration)', desc:'One of the most pugnacious birds in North America—will fearlessly attack birds many times its size to defend a flower patch. Undertakes one of the longest migrations relative to body size of any bird: 3,900 miles on a body the size of a ping-pong ball.' },
  { id:341,name:'Trumpeter Swan',          sci:'Cygnus buccinator',            cat:'bird',      emoji:'🦢', range:'Northern & western US', desc:'The largest native waterfowl in North America and the heaviest flying bird in the US, weighing up to 35 lbs. Its trumpeting call carries for miles. Hunted nearly to extinction by the 1930s; intensive management has brought numbers back.' },
  { id:342,name:'Snow Goose',              sci:'Anser caerulescens',           cat:'bird',      emoji:'🪿', range:'All of US (migratory)', desc:'Migrates in flocks so enormous they can darken the sky—single flocks in the Mississippi flyway may exceed a million birds. The population has grown so large it is destroying Arctic nesting habitats by over-grazing.' },
  { id:343,name:'Bufflehead',              sci:'Bucephala albeola',            cat:'bird',      emoji:'🦆', range:'All of US (winter)', desc:'The smallest diving duck in North America. Males have a stunning iridescent purple-green head with a bold white patch. Nests only in flicker holes—the only duck small enough to use them—and returns to the same hole year after year.' },
  { id:344,name:'Hooded Merganser',        sci:'Lophodytes cucullatus',        cat:'bird',      emoji:'🦆', range:'Eastern & Pacific US', desc:'The male\'s expandable white crest—raised in a dramatic fan during courtship—is one of the most striking displays in North American waterfowl. Dives and uses excellent underwater vision to catch fish in clear streams and ponds.' },
  { id:345,name:'Green Heron',             sci:'Butorides virescens',          cat:'bird',      emoji:'🦢', range:'All of US', desc:'One of the few tool-using birds. It drops feathers, insects, or bread crumbs onto the water as bait to attract fish—behavior observed independently in populations across North America.' },
  { id:346,name:'Tricolored Heron',        sci:'Egretta tricolor',             cat:'bird',      emoji:'🦢', range:'Southeast US coast', desc:'Slender and elegantly patterned in blue-gray, purple, and white, this heron actively chases fish with open wings—using them to shade the water and reduce glare so it can see prey more clearly.' },
  { id:347,name:'Purple Gallinule',        sci:'Porphyrio martinica',          cat:'bird',      emoji:'🐦', range:'Southeast US wetlands', desc:'One of the most colorful waterbirds in North America—iridescent purple, green, and turquoise—walking on lily pads on enormous yellow feet. Juveniles are buffy-brown and occasionally appear far north of the range as vagrants.' },
  { id:348,name:'Elegant Trogon',          sci:'Trogon elegans',               cat:'bird',      emoji:'🐦', range:'Southeast Arizona canyons', desc:'A jewel of the Arizona sky island canyons, this Mexican species reaches its northern limit in the US in the Chiricahua and Huachuca Mountains. Its metallic green back and crimson belly draw birders from across the country.' },
  { id:349,name:'Yellow-rumped Warbler',   sci:'Setophaga coronata',           cat:'bird',      emoji:'🐦', range:'All of US', desc:'The most abundant warbler in North America and the only one that can digest the wax in bayberries, allowing it to winter much farther north than most warblers. Birders affectionately call them "butter butts" for the bright yellow rump patch.' },
  { id:350,name:'Common Yellowthroat',     sci:'Geothlypis trichas',           cat:'bird',      emoji:'🐦', range:'All of US', desc:'The male\'s bold black bandit mask makes it one of the most recognizable warblers. One of the most widespread warblers in North America, found in virtually any wet, shrubby habitat. Its "witchety-witchety-witchety" song is iconic.' },
  { id:351,name:'Yellow-headed Blackbird', sci:'Xanthocephalus xanthocephalus',cat:'bird',      emoji:'🐦', range:'Western & central US', desc:'The male\'s shocking yellow head against jet-black body makes it unmistakable. Produces what may be the worst song of any North American bird—a sound described as a rusty gate being wrenched open.' },
  { id:352,name:'Eastern Meadowlark',      sci:'Sturnella magna',              cat:'bird',      emoji:'🐦', range:'Eastern & central US', desc:'A bird of open fields and grasslands, its rich, clear whistled song is one of the emblematic sounds of rural eastern America. Distinguishable from the western meadowlark by voice rather than appearance—the two look almost identical.' },
  { id:353,name:'Bobolink',               sci:'Dolichonyx oryzivorus',        cat:'bird',      emoji:'🐦', range:'Northern US (summer)', desc:'Breeding males are strikingly patterned—black below, white and yellow above—the reverse of almost every other bird. Undertakes one of the longest migrations of any songbird: 12,500 miles round-trip to Argentina and back.' },

  // ── REPTILES (additional III) ──
  { id:354,name:'Common Kingsnake',        sci:'Lampropeltis getula',          cat:'reptile',   emoji:'🐍', range:'Southern & western US', desc:'Immune to the venom of rattlesnakes, copperheads, and cottonmouths, the kingsnake actively hunts and eats venomous snakes in addition to lizards and rodents. Constrictors that kill by suffocation.' },
  { id:355,name:'Brown Anole',             sci:'Anolis sagrei',                cat:'reptile',   emoji:'🦎', range:'Florida (invasive)', desc:'An introduced Cuban lizard that has spread across Florida and is displacing the native green anole by competing for the same resources. The two species have triggered rapid evolution—green anoles now perch higher to avoid competition.' },

  // ── FISH (additional III) ──
  { id:356,name:'Black Crappie',           sci:'Pomoxis nigromaculatus',       cat:'fish',      emoji:'🐟', range:'Eastern & central US', desc:'A popular panfish with an irregular pattern of black spots rather than the striped pattern of the white crappie. Forages heavily at night and in low-light conditions, using large eyes adapted for dim water.' },
  { id:357,name:'Yellow Perch',            sci:'Perca flavescens',             cat:'fish',      emoji:'🐟', range:'Northern & central US', desc:'One of the most popular sport and eating fish in the northern US, with golden-yellow sides and bold black vertical bars. Spawns in large schools that produce long, ribbon-like gelatinous egg masses draped over submerged vegetation.' },
  { id:358,name:'Flathead Catfish',        sci:'Pylodictis olivaris',          cat:'fish',      emoji:'🐟', range:'Central & southern US', desc:'A mottled, flattened-headed giant that can reach 5 feet and 100 lbs, lurking motionless under logs waiting to ambush prey. Unlike other catfish, it prefers live prey—including other catfish—over carrion.' },
  { id:359,name:'Common Carp',             sci:'Cyprinus carpio',              cat:'fish',      emoji:'🐟', range:'All of US (introduced)', desc:'Introduced from Europe in the 1800s and now one of the most ecologically damaging invasive fish in the US. Uproots aquatic vegetation and muddies the water when feeding, transforming clear lakes into turbid ponds.' },
  { id:360,name:'Tarpon',                  sci:'Megalops atlanticus',          cat:'fish',      emoji:'🐟', range:'Gulf Coast, South Atlantic', desc:'Can reach 8 feet and 280 lbs, and breathes air by gulping at the surface—an adaptation that lets it survive in oxygen-depleted water. Its spectacular, gill-rattling leaps when hooked make it one of the most prized sport fish in the world.' },
  { id:361,name:'Red Drum (Redfish)',      sci:'Sciaenops ocellatus',          cat:'fish',      emoji:'🐟', range:'Gulf Coast & South Atlantic', desc:'Named for the drumming sound males make by vibrating their swim bladder during spawning. The distinctive eyespot near the tail is thought to confuse predators about which end is the head.' },
  { id:362,name:'Mahi-mahi',              sci:'Coryphaena hippurus',          cat:'fish',      emoji:'🐟', range:'Offshore Atlantic, Gulf & Pacific', desc:'One of the fastest-growing fish on Earth—reaching 4 feet in its first year. Its iridescent blue-green-gold colors fade to gray within minutes of death. The bull (male) has a distinctive blunt, bony forehead.' },

  // ── INVERTEBRATES (additional III) ──
  { id:363,name:'By-the-Wind Sailor',      sci:'Velella velella',              cat:'insect',    emoji:'🪼', range:'Pacific & Atlantic coasts (stranding events)', desc:'Not a jellyfish but a colonial hydrozoan with a transparent sail that catches the wind to drift across the open ocean. Periodically washes ashore in mass strandings of millions along Pacific beaches, carpeting the sand in iridescent blue.' },
  { id:364,name:'Pacific Sand Dollar',     sci:'Dendraster excentricus',       cat:'insect',    emoji:'🪨', range:'Pacific coast beaches & shallow water', desc:'Living sand dollars are covered in purple-brown spines and tube feet and move slowly through sand, filter-feeding. The familiar white "skeleton" found on beaches is bleached by the sun after the animal dies.' },
  { id:365,name:'Eastern Oyster',          sci:'Crassostrea virginica',        cat:'insect',    emoji:'🦪', range:'Atlantic & Gulf coasts', desc:'A keystone species that filters up to 50 gallons of water per day per oyster. Oyster reefs provide critical habitat for hundreds of species and protect coastlines from erosion. Once blanketed the Chesapeake Bay in continent-scale beds.' },
];

// ── App State ──────────────────────────────────────────────────────────────
const STORAGE_KEY = 'wilddex_seen_v1';
let seen = {};  // { animalId: dateString }
let activeTab = 'all';
let searchQuery = '';
let activeFilter = 'all';
let selectedState = '';
let modalAnimal = null;

function loadSeen() {
  try { seen = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { seen = {}; }
}
function saveSeen() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(seen));
}

// ── Helpers ────────────────────────────────────────────────────────────────
function isSeen(id) { return seen[id] !== undefined; }
function seenDate(id) { return seen[id] || null; }
function totalSeen() { return Object.keys(seen).length; }
function countSeenIn(cat) { return ANIMALS.filter(a => a.cat === cat && isSeen(a.id)).length; }
function countIn(cat) { return ANIMALS.filter(a => a.cat === cat).length; }
function catColor(catId) { return (CATEGORIES.find(c => c.id === catId) || {}).color || '#4caf50'; }
function padNum(n) { return String(n).padStart(3,'0'); }

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}

// ── Render: Header progress ────────────────────────────────────────────────
function updateHeaderProgress() {
  const total = ANIMALS.length;
  const s = totalSeen();
  document.getElementById('overall-count').textContent = `${s} / ${total}`;
  document.getElementById('overall-fill').style.width = `${(s/total*100).toFixed(1)}%`;
}

// ── Render: Stats panel ────────────────────────────────────────────────────
function renderStats() {
  const panel = document.getElementById('stats-panel');
  const cards = CATEGORIES.map(cat => {
    const s = countSeenIn(cat.id);
    const t = countIn(cat.id);
    const pct = t ? Math.round(s/t*100) : 0;
    return `<div class="stat-card">
      <div class="stat-icon">${cat.icon}</div>
      <div class="stat-label">${cat.label}</div>
      <div class="stat-value">${pct}%</div>
      <div class="stat-sub">${s} / ${t}</div>
    </div>`;
  }).join('');
  panel.innerHTML = `<div class="stats-title">Your Progress</div><div class="stats-grid">${cards}</div>`;
}

// ── Render: Tabs ───────────────────────────────────────────────────────────
function renderTabs() {
  const container = document.getElementById('tabs');
  const allCount = ANIMALS.length;
  const allSeen = totalSeen();
  let html = `<button class="tab ${activeTab==='all'?'active':''}" data-tab="all">All <span class="count">${allSeen}/${allCount}</span></button>`;
  CATEGORIES.forEach(cat => {
    const s = countSeenIn(cat.id), t = countIn(cat.id);
    html += `<button class="tab ${activeTab===cat.id?'active':''}" data-tab="${cat.id}">${cat.icon} ${cat.label} <span class="count">${s}/${t}</span></button>`;
  });
  container.innerHTML = html;
  container.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTab = btn.dataset.tab;
      renderTabs();
      renderContent();
    });
  });
}

// ── Render: Content grid ───────────────────────────────────────────────────
function getFilteredAnimals() {
  let animals = ANIMALS;
  if (activeTab !== 'all') animals = animals.filter(a => a.cat === activeTab);
  if (selectedState) animals = animals.filter(a => (ANIMAL_STATES[a.id] || []).includes(selectedState));
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    animals = animals.filter(a => a.name.toLowerCase().includes(q) || a.sci.toLowerCase().includes(q));
  }
  if (activeFilter === 'seen') animals = animals.filter(a => isSeen(a.id));
  if (activeFilter === 'unseen') animals = animals.filter(a => !isSeen(a.id));
  return animals;
}

function renderContent() {
  const animals = getFilteredAnimals();
  document.getElementById('result-count').textContent = `${animals.length} species`;

  const content = document.getElementById('content');
  if (!animals.length) {
    content.innerHTML = `<div class="empty"><span class="empty-icon">🔭</span>No species match your search.</div>`;
    return;
  }

  // Group by category for "All" view; single group otherwise
  let grouped;
  if (activeTab === 'all' && !searchQuery) {
    grouped = CATEGORIES.map(cat => ({
      cat,
      animals: animals.filter(a => a.cat === cat.id)
    })).filter(g => g.animals.length > 0);
  } else {
    const catObj = CATEGORIES.find(c => c.id === activeTab) ||
      { id:'results', label:'Results', icon:'🔍' };
    grouped = [{ cat: catObj, animals }];
  }

  content.innerHTML = grouped.map(({ cat, animals: group }) => {
    const s = group.filter(a => isSeen(a.id)).length;
    const t = group.length;
    const pct = t ? (s/t*100).toFixed(0) : 0;
    return `<div class="category-section" data-cat="${cat.id}">
      <div class="category-header">
        <span class="category-icon">${cat.icon}</span>
        <span class="category-name">${cat.label}</span>
        <span class="category-progress-text">${s}/${t}</span>
        <div class="category-progress-mini">
          <div class="category-progress-mini-fill" style="width:${pct}%"></div>
        </div>
      </div>
      <div class="grid">
        ${group.map(a => renderCard(a)).join('')}
      </div>
    </div>`;
  }).join('');

  // Attach card click listeners
  content.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => {
      const id = Number(card.dataset.id);
      openModal(ANIMALS.find(a => a.id === id));
    });
  });
}

function renderCard(animal) {
  const s = isSeen(animal.id);
  const dotColor = catColor(animal.cat);
  const dateStr = s ? formatDate(seenDate(animal.id)) : '';
  return `<div class="card ${s?'seen':''}" data-id="${animal.id}" title="${s?animal.name:'???'}">
    <span class="card-number">#${padNum(animal.id)}</span>
    <span class="card-check">✓</span>
    <span class="card-emoji">${animal.emoji}</span>
    <span class="card-name">${animal.name}</span>
    <span class="card-date">${dateStr}</span>
    <span class="card-category-dot" style="background:${dotColor}"></span>
  </div>`;
}

// ── Wikipedia photo fetch ──────────────────────────────────────────────────
const photoCache = {};

async function fetchWikiPhoto(animal) {
  const wrap = document.getElementById('m-photo-wrap');
  const img = document.getElementById('m-photo');
  const placeholder = document.getElementById('m-photo-placeholder');
  const credit = document.getElementById('m-photo-credit');
  const loading = document.getElementById('m-photo-loading');

  // Reset state
  wrap.classList.remove('has-photo');
  img.classList.remove('loaded');
  img.src = '';
  credit.textContent = '';
  loading.style.display = 'flex';
  placeholder.style.display = 'none';

  if (photoCache[animal.id]) {
    applyPhoto(photoCache[animal.id]);
    return;
  }

  // Try scientific name first, fall back to common name
  const titles = [animal.sci.replace(/ /g,'_'), animal.name.replace(/ /g,'_')];
  let result = null;
  for (const title of titles) {
    try {
      const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`);
      if (!res.ok) continue;
      const data = await res.json();
      if (data.thumbnail?.source) { result = data; break; }
    } catch { /* network error — try next */ }
  }

  // Check the modal wasn't closed/changed while we were fetching
  if (modalAnimal?.id !== animal.id) return;

  if (result?.thumbnail?.source) {
    const src = result.thumbnail.source.replace(/\/\d+px-/, '/500px-');
    const attribution = result.credits || (result.content_urls?.desktop?.page ? `© Wikipedia` : '© Wikipedia');
    photoCache[animal.id] = { src, attribution };
    applyPhoto({ src, attribution });
  } else {
    loading.style.display = 'none';
    placeholder.textContent = animal.emoji;
    placeholder.style.display = 'block';
  }
}

function applyPhoto({ src, attribution }) {
  const wrap = document.getElementById('m-photo-wrap');
  const img = document.getElementById('m-photo');
  const credit = document.getElementById('m-photo-credit');
  const loading = document.getElementById('m-photo-loading');
  const placeholder = document.getElementById('m-photo-placeholder');

  img.onload = () => {
    loading.style.display = 'none';
    placeholder.style.display = 'none';
    img.classList.add('loaded');
    wrap.classList.add('has-photo');
    credit.textContent = attribution;
  };
  img.onerror = () => {
    loading.style.display = 'none';
    placeholder.textContent = modalAnimal?.emoji || '?';
    placeholder.style.display = 'block';
  };
  img.src = src;
}

// ── Modal ──────────────────────────────────────────────────────────────────
function openModal(animal) {
  modalAnimal = animal;
  const s = isSeen(animal.id);
  document.getElementById('m-number').textContent = `#${padNum(animal.id)}`;
  document.getElementById('m-name').textContent = animal.name;
  document.getElementById('m-sci').textContent = s ? animal.sci : '— not yet identified —';
  document.getElementById('m-cat').textContent = (CATEGORIES.find(c => c.id === animal.cat)||{}).label || animal.cat;
  document.getElementById('m-desc').textContent = s ? animal.desc : 'Encounter this animal in the wild to unlock its entry.';
  document.getElementById('m-range').textContent = s ? animal.range : '???';
  const dateEl = document.getElementById('m-date');
  dateEl.textContent = s ? `First spotted: ${formatDate(seenDate(animal.id))}` : '';

  fetchWikiPhoto(animal);

  const btn = document.getElementById('modal-action');
  if (s) {
    btn.textContent = '✗ Mark as Not Seen';
    btn.className = 'modal-btn unseen-btn';
  } else {
    btn.textContent = '✓ Mark as Seen!';
    btn.className = 'modal-btn';
  }
  btn.onclick = () => { toggleSeen(animal.id); closeModal(); };

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  modalAnimal = null;
}

// ── Toggle seen ────────────────────────────────────────────────────────────
let toastTimer;
function toggleSeen(id) {
  const animal = ANIMALS.find(a => a.id === id);
  if (isSeen(id)) {
    delete seen[id];
    saveSeen();
    showToast(`Unmarked: ${animal.name}`, true);
  } else {
    seen[id] = new Date().toISOString();
    saveSeen();
    showToast(`🎉 Spotted: ${animal.name}!`, false);
  }
  // Animate the card
  const card = document.querySelector(`.card[data-id="${id}"]`);
  if (card) {
    card.classList.toggle('seen', isSeen(id));
    // Update inner parts
    card.querySelector('.card-name').style.color = isSeen(id) ? 'var(--text)' : 'var(--text-muted)';
    const emoji = card.querySelector('.card-emoji');
    emoji.style.filter = isSeen(id) ? 'none' : 'grayscale(1) brightness(0.25)';
    const check = card.querySelector('.card-check');
    check.style.opacity = isSeen(id) ? '1' : '0';
    check.style.transform = isSeen(id) ? 'scale(1)' : 'scale(0.5)';
    const dateEl = card.querySelector('.card-date');
    dateEl.textContent = isSeen(id) ? formatDate(seenDate(id)) : '';

    card.classList.remove('reveal-anim');
    void card.offsetWidth;
    card.classList.add('reveal-anim');
    card.addEventListener('animationend', () => card.classList.remove('reveal-anim'), {once:true});
  }

  updateHeaderProgress();
  renderStats();
  renderTabs();
}

function showToast(msg, unseen) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (unseen ? ' unseen-toast' : '') + ' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.classList.remove('show'); }, 2200);
}

// ── Filter row ─────────────────────────────────────────────────────────────
function initFilterRow() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      renderContent();
    });
  });
}

// ── State selector ─────────────────────────────────────────────────────────
function initStateSelect() {
  const sel = document.getElementById('state-select');
  Object.entries(STATE_NAMES).sort((a,b) => a[1].localeCompare(b[1])).forEach(([code, name]) => {
    const opt = document.createElement('option');
    opt.value = code;
    opt.textContent = name;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => {
    selectedState = sel.value;
    renderTabs();
    renderContent();
  });
}

// ── Search ─────────────────────────────────────────────────────────────────
function initSearch() {
  document.getElementById('search').addEventListener('input', e => {
    searchQuery = e.target.value.trim();
    renderContent();
  });
}

// ── Modal close ────────────────────────────────────────────────────────────
function initModal() {
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });
}

// ── Boot ───────────────────────────────────────────────────────────────────
loadSeen();
initFilterRow();
initStateSelect();
initSearch();
initModal();
updateHeaderProgress();
renderStats();
renderTabs();
renderContent();
</script>
